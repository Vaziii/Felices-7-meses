<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi niña ❤️</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary-color: #ff4d6d;
            --hover-color: #ff758f;
            --bg-color: #050505;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: var(--bg-color);
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        /* GALAXIA */

        #galaxia {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1; 
            pointer-events: none;
        }

        /* AUDIO */

        #audio-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 50px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        #audio-icon {
            cursor: pointer;
        }

        #volumen {
            width: 80px;
        }

        /* INICIO */

        #inicio {
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            transition: opacity 1s;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: var(--primary-color);
        }

        .gif {
            width: 250px;
            border-radius: 20px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            border: none;
            background: var(--primary-color);
            color: white;
            cursor: pointer;
        }

        /* HISTORIA */

        #historia {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            z-index: 30;
        }

        #textoHistoria {
            max-width: 800px;
            font-size: 1.8rem;
        }

        /* TUNEL */

        #scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            perspective: 1000px;
            display: none;
            z-index: 10; 
        }

        #gallery {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-style: preserve-3d;
            transform: translate(-50%, -50%);
        }

        .photo {
            position: absolute;
            width: 280px;
            height: 280px;
            margin-left: -140px;
            margin-top: -140px;
            border-radius: 20px;
            overflow: hidden;
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .phrase {
            position: absolute;
            font-size: 2.5rem;
            font-family: 'Dancing Script', cursive;
        }

        .mensaje-final {
            position: absolute;
            font-size: 5rem;
            font-family: 'Dancing Script', cursive;
            white-space: nowrap;
        }

        #instrucciones {
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            z-index: 50;
            display: none;
        }

        /* BOTÓN Y TEXTO LATERAL */
        #btn-izquierdo {
            position: fixed;
            top: 50%;
            left: 40px;
            transform: translateY(-50%);
            z-index: 100;
            display: none;
            box-shadow: 0 5px 20px rgba(255, 77, 109, 0.5);
            transition: all 0.3s ease;
        }

        #btn-izquierdo:hover {
            background: var(--hover-color);
            transform: translateY(-50%) scale(1.05);
        }

        #texto-derecho {
            position: fixed;
            top: 50%;
            right: 40px;
            transform: translateY(-50%);
            z-index: 5;
            display: none;
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            color: white;
            max-width: 300px;
            text-align: center;
            line-height: 1.2;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        /* Ajuste para móviles */
        @media (max-width: 768px) {
            #btn-izquierdo {
                top: auto;
                bottom: 80px;
                left: 50%;
                transform: translateX(-50%);
            }

            #btn-izquierdo:hover {
                transform: translateX(-50%) scale(1.05);
            }

            #texto-derecho {
                top: 80px;
                right: 50%;
                transform: translateX(50%);
                font-size: 1.5rem; /* Texto pequeño para celulares */
                width: 90%;
            }
        }
    </style>
</head>

<body>

    <canvas id="galaxia"></canvas>

    <div id="audio-controls">
        <span id="audio-icon" onclick="toggleAudio()">🔊</span>
        <input type="range" id="volumen" min="0" max="1" step="0.01" value="1" oninput="cambiarVolumen(this.value)">
    </div>

    <audio id="musica" loop>
        <source src="te-amo-mucho.mp3" type="audio/mpeg">
    </audio>

    <div id="inicio">
        <img src="https://i.pinimg.com/originals/e4/70/fa/e470fab0bb6af102a1d9f96f09950af8.png" class="gif">
        <h1>¿Estás lista para tu regalo?</h1>
        <button onclick="iniciarExperiencia()">Sí❤️</button>
    </div>

    <div id="historia">
        <p id="textoHistoria">Hay cosas que no siempre se pueden explicar con palabras...</p>
        <button onclick="siguienteTexto()">❤️</button>
    </div>

    <div id="scene">
        <div id="gallery"></div>
    </div>

    <button id="btn-izquierdo" onclick="cambiarTextoLateral()">Recibir Mas Amor ❤️</button>
    <div id="texto-derecho"></div>

    <div id="instrucciones">
        Disfruta el viaje ✨
    </div>

    <script>

        /* AUDIO */

        const audio = document.getElementById("musica");
        const audioIcon = document.getElementById("audio-icon");

        function iniciarExperiencia() {
            audio.play();
            document.getElementById("inicio").style.display = "none";
            document.getElementById("historia").style.display = "flex";
        }

        function toggleAudio() {
            if (audio.paused) {
                audio.play();
                audioIcon.innerText = "🔊";
            } else {
                audio.pause();
                audioIcon.innerText = "🔇";
            }
        }

        function cambiarVolumen(v) {
            audio.volume = v;
        }

        /* HISTORIA */

        const textos = [
            "Hay cosas que no siempre se pueden explicar con palabras...",
            "Desde que llegaste a mi vida todo se volvió más bonito.",
            "Eres alguien muy especial para mí.",
            "Por eso te preparé algo que te sientas especial.",
            "Espero Te guste ❤️"
        ];

        let paso = 0;

        function siguienteTexto() {

            paso++;

            if (paso < textos.length) {

                document.getElementById("textoHistoria").innerText = textos[paso];

            } else {

                document.getElementById("historia").style.display = "none";
                iniciarTunel();

            }

        }

        /* GALAXIA Y ESTRELLA FUGAZ Y HUMO DEL TEXTO */

        const canvas = document.getElementById("galaxia");
        const ctx = canvas.getContext("2d");

        let stars = [];
        let textSmokeParticles = []; // NUEVO: Arreglo para el humo del texto

        let shootingHeart = {
            active: false,
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            trail: []
        };

        function initStars() {

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            stars = [];

            for (let i = 0; i < 300; i++) {

                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 2,
                    v: Math.random() * 0.5 + 0.1,
                    opacity: Math.random()
                });

            }

        }

        function drawStars() {

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Dibujar estrellas normales
            stars.forEach(s => {
                ctx.fillStyle = `rgba(255,255,255,${s.opacity})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();

                s.y -= s.v;

                if (s.y < 0) {
                    s.y = canvas.height;
                    s.x = Math.random() * canvas.width;
                }
            });

            // 2. NUEVO: Dibujar el humo mágico de las letras
            for (let i = textSmokeParticles.length - 1; i >= 0; i--) {
                let p = textSmokeParticles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.opacity -= 0.015; // Velocidad con la que desaparece el humo

                if (p.opacity <= 0) {
                    textSmokeParticles.splice(i, 1);
                } else {
                    ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "#ff4d6d";
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            ctx.shadowBlur = 0; // Resetear sombra

            // 3. Lógica de la estrella fugaz de corazón
            if (shootingHeart.active) {
                shootingHeart.x += shootingHeart.vx;
                shootingHeart.y += shootingHeart.vy;

                shootingHeart.trail.push({
                    x: shootingHeart.x,
                    y: shootingHeart.y,
                    opacity: 1,
                    size: Math.random() * 6 + 2
                });

                if (shootingHeart.trail.length > 40) {
                    shootingHeart.trail.shift();
                }

                shootingHeart.trail.forEach((p, index) => {
                    p.opacity -= 0.025;
                    if (p.opacity > 0) {
                        ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = "#ff4d6d";
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });

                ctx.font = "48px Arial";
                ctx.shadowBlur = 30;
                ctx.shadowColor = "#ff4d6d";
                ctx.fillText("❤️", shootingHeart.x - 24, shootingHeart.y + 16);
                ctx.shadowBlur = 0;

                if (shootingHeart.y > canvas.height || shootingHeart.x < -50 || shootingHeart.x > canvas.width + 50) {
                    shootingHeart.active = false;
                    shootingHeart.trail = [];
                }
            } else {
                if (Math.random() < 0.01) {
                    shootingHeart.active = true;
                    shootingHeart.x = Math.random() * canvas.width;
                    shootingHeart.y = -50;
                    shootingHeart.vx = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 2 + 1);
                    shootingHeart.vy = Math.random() * 2 + 3;
                    shootingHeart.trail = [];
                }
            }

            requestAnimationFrame(drawStars);

        }

        initStars();
        drawStars();

        window.addEventListener("resize", initStars);

        /* LÓGICA DE TEXTOS LATERALES CON HUMO MÁGICO */

        const frasesLaterales = [
            "Eres increíble aún recién levantada, eres increíble ya dormida, eres increíble, siendo tú😊",
            "Ojalá te miraras con los mismos ojos que yo te veo, para que nunca pienses mal de ti.💖",
            "Si tus ojos fueran mina, tus lágrimas serian los diamantes más hermosos que puedes tener✨",
            "El viento que roza tu cabello es el mismo aliento que te mando para que sigas recorriendo la vida cada día bb🥰",
            "Te amo tanto como sea posible, para que cuando nos separemos sea imposible🌌",
            "Espero cada 8 recuerdes que te amo cada 🌹",
            "❤️"
        ];

        let indiceFraseLateral = 0;

        function cambiarTextoLateral() {
            const divTexto = document.getElementById("texto-derecho");

            // Ocultamos el texto actual
            divTexto.style.opacity = 0;

            setTimeout(() => {
                indiceFraseLateral++;
                if (indiceFraseLateral >= frasesLaterales.length) {
                    indiceFraseLateral = 0;
                }

                // Actualizamos el texto y lo mostramos
                divTexto.innerText = frasesLaterales[indiceFraseLateral];
                divTexto.style.opacity = 1;

                // --- NUEVO: EXPLOSIÓN DE HUMO ESTELAR ---
                // Obtenemos la posición del texto en la pantalla
                const rect = divTexto.getBoundingClientRect();
                
                // Calculamos el centro aproximado del texto
                let centroX = rect.left + (rect.width / 2);
                let centroY = rect.top + (rect.height / 2);

                // Si el ancho es 0 (ej. primera carga), usamos un aproximado
                if(rect.width === 0){
                    centroX = window.innerWidth > 768 ? window.innerWidth - 150 : window.innerWidth / 2;
                    centroY = window.innerWidth > 768 ? window.innerHeight / 2 : 100;
                }

                // Generamos 60 partículas de humo mágico
                for (let i = 0; i < 60; i++) {
                    textSmokeParticles.push({
                        // Esparcimos el humo a lo ancho y alto del texto
                        x: centroX + (Math.random() - 0.5) * (rect.width || 300) * 1.2,
                        y: centroY + (Math.random() - 0.5) * (rect.height || 100),
                        // Movimiento suave hacia los lados
                        vx: (Math.random() - 0.5) * 2,
                        // Movimiento ascendente (como humo/burbujas)
                        vy: (Math.random() * -2) - 0.5,
                        opacity: 1,
                        // Mismo tamaño que el humo de la estrella fugaz
                        size: Math.random() * 6 + 2
                    });
                }
                // ----------------------------------------

            }, 400); // 400ms es el tiempo que tarda el texto en desaparecer
        }

        /* TUNEL */

        const images = [
            "fotos/1.jpeg", "fotos/2.jpeg", "fotos/3.jpeg", "fotos/4.jpeg",
            "fotos/5.jpeg", "fotos/6.jpeg", "fotos/7.jpeg", "fotos/8.jpeg",
            "fotos/9.jpeg", "fotos/10.jpeg", "fotos/11.jpeg", "fotos/12.jpeg",
            "fotos/13.jpeg", "fotos/14.jpeg", "fotos/15.jpeg", "fotos/16.jpeg",
            "fotos/17.jpeg", "fotos/18.jpeg", "fotos/19.jpeg", "fotos/20.jpeg",
            "fotos/21.jpeg", "fotos/22.jpeg", "fotos/23.jpeg", "fotos/24.jpeg",
            "fotos/25.jpeg", "fotos/26.jpeg", "fotos/27.jpeg", "fotos/28.jpeg",
            "fotos/29.jpeg", "fotos/30.jpeg"
        ];

        const phrases = [
            "Te amo", "Eres increíble", "Hermosa", "Mi universo",
            "Mi luna", "Mi estrella", "Bella", "Preciosa",
            "Reina", "Princesa", "Ojitos de kiwi", "Onichan",
            "UwU", "Te adoro", "Te quiero", "Te deseo",
            "Mi estrella fugaz", "Mi hamburguesa doble", "Guapa"
        ];

        const gallery = document.getElementById("gallery");

        const totalItems = 60;
        const spacing = 1200;

        let cameraZ = 0;
        let targetZ = 0;
        let autoScrollActivo = false;

        const maxZ = (totalItems * spacing) + 400;

        function iniciarTunel() {

            document.getElementById("scene").style.display = "block";
            document.getElementById("instrucciones").style.display = "block";

            // Mostrar los nuevos controles laterales
            document.getElementById("btn-izquierdo").style.display = "block";
            document.getElementById("texto-derecho").style.display = "block";

            // Colocar la primera frase lateral
            document.getElementById("texto-derecho").innerText = frasesLaterales[0];
            // Asegurar que se muestre (Fade in)
            setTimeout(() => {
                document.getElementById("texto-derecho").style.opacity = 1;
            }, 100);

            crearTunel();

            autoScrollActivo = true;

        }

        function crearTunel() {

            for (let i = 0; i < totalItems; i++) {

                const z = -i * spacing;

                const angulo = i * Math.PI * 0.4;
                const radio = 300 + Math.random() * 200;

                const x = Math.cos(angulo) * radio;
                const y = Math.sin(angulo) * radio;

                if (i % 2 === 0) {

                    const photo = document.createElement("div");
                    photo.className = "photo";

                    photo.innerHTML = `<img src="${images[(i / 2) % images.length]}">`;

                    photo.style.transform = `translate3d(${x}px,${y}px,${z}px)`;

                    gallery.appendChild(photo);

                } else {

                    const txt = document.createElement("div");
                    txt.className = "phrase";

                    txt.innerText = phrases[Math.floor(Math.random() * phrases.length)];

                    txt.style.transform = `translate3d(${x}px,${y}px,${z}px)`;

                    gallery.appendChild(txt);

                }

            }

            /* MENSAJE FINAL */

            const finalTxt = document.createElement("div");

            finalTxt.className = "mensaje-final";
            finalTxt.innerText = "Felices 7 meses❤️";

            const finalZ = -(totalItems * spacing) - 2000;

            finalTxt.style.left = "50%";
            finalTxt.style.top = "50%";
            finalTxt.style.transform = `translate3d(-50%,-50%,${finalZ}px)`;

            gallery.appendChild(finalTxt);

        }

        /* SCROLL */

        window.addEventListener("wheel", e => {
            targetZ -= e.deltaY * 3;
            if (targetZ < 0) targetZ = 0;
        });

        function animateCamera() {

            if (autoScrollActivo) {

                targetZ += 2;

                if (targetZ >= maxZ) {

                    targetZ = maxZ;
                    autoScrollActivo = false;

                }

            }

            cameraZ += (targetZ - cameraZ) * 0.05;

            gallery.style.transform = `translate(-50%,-50%) translateZ(${cameraZ}px)`;

            requestAnimationFrame(animateCamera);
        }
        animateCamera();

    </script>
</body>

</html>
